name: Use custom action

on: 
    # push
    workflow_dispatch:

jobs:
    greet:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4 

            - name: Calling Custom action
              uses: ./.github/actions/setup-and-greet
              with:
                name: "Aakash"
                language: "en"

