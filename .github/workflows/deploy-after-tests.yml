name: Deploy after tests

on: 
    workflow_run:
        workflows: ["Run Tests"]
        types: [completed]

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
           - name: Check Result 
             if: ${{ github.event.workflow_run.conclusion  == 'success' }}
             run: echo "deploying..."

           - name: Fail message
             if: ${{ github.event.workflow_run.conclusion != 'success' }}
             run: echo "Tests failed , not deploying "
