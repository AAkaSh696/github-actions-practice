name: Job output

on: 
    workflow_dispatch:

jobs:
    set-date:
        runs-on: ubuntu-latest
        outputs:
            today: ${{ steps.genDATE.outputs.date}}
        steps:
            - name: Generate date
              id: genDATE
              run: echo "date=$(date)" >> $GITHUB_OUTPUT 

    print-date:
        runs-on: ubuntu-latest
        needs: [set-date]
        steps:
            - name: Today date
              run: echo "Todays date is  ${{ needs.set-date.outputs.today}}"