name: First Reusable 

on:
    workflow_call:

        inputs:
            app_name:
                required: true
                type: string 

            environment :
                required: true
                type: string
                default: staging
        secrets:
             docker_token:
                required: true
        outputs:
            build_version:
                value: ${{jobs.build.outputs.version}}


jobs:
    reusable_job:
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.set_var.outputs.version}}
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Build app
              run: echo "Building ${{ inputs.app_name }} for ${{inputs.environment }}"

            - name: Check token
              run: |
                if [ -n $"{{secrets.docker_token }}" ]; then
                    echo "Docker token is set: true"
                else
                    echo "Docker token is not set"
                fi 

            - name: Generate Version
              id: set_var
              run: echo "version=v1.0-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT 
